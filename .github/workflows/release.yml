name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create extension archive
        run: zip -r computo-quarto-extension.zip _extensions/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: computo-quarto-extension.zip
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            quarto add computorg/computo-quarto-extension@${{ github.ref_name }}
            ```
